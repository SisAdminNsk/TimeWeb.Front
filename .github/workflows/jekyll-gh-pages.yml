# Sample workflow for building and deploying a Vite React site to GitHub Pages
name: Deploy Vite React to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ──────────────────────────────────────────────────────────
      # Обновление .env файлов для production
      # ──────────────────────────────────────────────────────────
      - name: Update .env for production
        run: |
          # Production API URL
          PROD_API_URL="https://176.108.248.16:443"
          
          # Обновляем .env
          sed -i "s|VITE_USERS_API_URL=.*|VITE_USERS_API_URL=${PROD_API_URL}/api/users|g" .env
          sed -i "s|VITE_FRIENDS_API_URL=.*|VITE_FRIENDS_API_URL=${PROD_API_URL}/api/friends|g" .env
          
          # Обновляем .env.production
          sed -i "s|VITE_USERS_API_URL=.*|VITE_USERS_API_URL=${PROD_API_URL}/api/users|g" .env.production
          sed -i "s|VITE_FRIENDS_API_URL=.*|VITE_FRIENDS_API_URL=${PROD_API_URL}/api/friends|g" .env.production
          
          echo "✅ .env files updated for production"

      - name: Verify .env files
        run: |
          echo "=== .env ==="
          cat .env
          echo ""
          echo "=== .env.production ==="
          cat .env.production
          echo ""
          echo "=== .env.development ==="
          cat .env.development

      - name: Build with Vite
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
